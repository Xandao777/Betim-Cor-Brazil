<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Calendário de eventos da Associação. Veja eventos passados e futuros e inscreva-se online.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Eventos | Associação">
  <meta property="og:description" content="Calendário de eventos da Associação. Veja eventos passados e futuros e inscreva-se online.">
  <meta property="og:locale" content="pt_BR">
  <title>Eventos | Associação</title>
  <link rel="icon" href="img/logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <a href="#main" class="skip-link">Ir para o conteúdo principal</a>
    <div data-site-chrome="header"></div>

  <main id="main" class="pagina-interna">
    <div class="container">
      <h1>Eventos e Atividades</h1>
      <p class="intro">Confira o calendário de eventos, destaques de atividades realizadas e inscreva-se online.</p>

      <section class="calendario-nav" aria-label="Navegação do calendário">
        <span class="calendario-mes" id="mes-atual" aria-live="polite"></span>
        <div>
          <button type="button" class="btn btn-outline" id="btn-ant">Anterior</button>
          <button type="button" class="btn btn-outline" id="btn-prox">Próximo</button>
        </div>
      </section>

      <section id="inscricao" class="lista-eventos" aria-labelledby="titulo-lista">
        <h2 id="titulo-lista" class="sr-only">Lista de eventos e inscrições</h2>
        <!-- Cards de eventos gerados via JavaScript; cada um leva para evento.html?id=... -->
      </section>
    </div>
  </main>

    <div data-site-chrome="footer"></div>
  <script src="js/site-chrome.js"></script>
  <script src="js/dados-site.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/publico-dados.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
