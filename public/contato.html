<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Entre em contato com a Associação: dúvidas, sugestões e solicitações.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Contato | Associação">
  <meta property="og:description" content="Entre em contato com a Associação: dúvidas, sugestões e solicitações.">
  <meta property="og:locale" content="pt_BR">
  <title>Contato | Associação</title>
  <link rel="icon" href="img/logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <a href="#main" class="skip-link">Ir para o conteúdo principal</a>
    <div data-site-chrome="header"></div>

  <main id="main" class="pagina-interna">
    <div class="container">
      <h1>Contato</h1>
      <p class="intro">Envie dúvidas, sugestões ou solicitações pelo formulário abaixo.</p>

      <section class="section contato-dados-api" aria-labelledby="titulo-contato-dados">
        <h2 id="titulo-contato-dados" class="section-title">Fale conosco</h2>
        <p>E-mail: <a href="#" data-inst-mailto><span data-institucional="email"></span></a></p>
        <p>Telefone: <span data-institucional="telefone"></span></p>
      </section>

      <form class="form-max" id="form-contato" aria-label="Formulário de contato">
        <div class="form-group">
          <label for="nome">Nome completo *</label>
          <input type="text" id="nome" name="nome" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="email">E-mail *</label>
          <input type="email" id="email" name="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="assunto">Assunto *</label>
          <select id="assunto" name="assunto" required>
            <option value="">Selecione</option>
            <option value="duvida">Dúvida</option>
            <option value="sugestao">Sugestão</option>
            <option value="solicitacao">Solicitação / Inscrição</option>
            <option value="outro">Outro</option>
          </select>
        </div>
        <div class="form-group">
          <label for="mensagem">Mensagem *</label>
          <textarea id="mensagem" name="mensagem" rows="5" required></textarea>
        </div>
        <div class="hp-field" aria-hidden="true">
          <label for="website-contato">Website</label>
          <input type="text" id="website-contato" name="website" tabindex="-1" autocomplete="off">
        </div>
        <div class="form-group form-group-consent">
          <label class="checkbox-label">
            <input type="checkbox" id="consent-contato" name="consentimento" required value="1">
            Li e aceito a <a href="privacidade.html" target="_blank" rel="noopener">política de privacidade</a> *
          </label>
        </div>
        <div class="form-group" data-turnstile aria-label="Verificação de segurança"></div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Enviar mensagem</button>
        </div>
      </form>

      <section class="section" aria-labelledby="titulo-redes">
        <h2 id="titulo-redes">Redes sociais</h2>
        <p>Siga-nos e compartilhe nosso conteúdo para maior engajamento.</p>
        <div class="social-links">
          <a href="#" class="btn btn-outline" data-inst-href="facebook">Facebook</a>
          <a href="#" class="btn btn-outline" data-inst-href="instagram">Instagram</a>
          <a href="#" class="btn btn-outline" data-inst-href="youtube">YouTube</a>
        </div>
      </section>
    </div>
  </main>

    <div data-site-chrome="footer"></div>
  <script src="js/site-chrome.js"></script>
  <script src="js/dados-site.js"></script>
  <script src="js/publico-dados.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/turnstile-forms.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
