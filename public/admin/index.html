<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Área Administrativa – Login</title>
  <link rel="icon" href="../img/logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-login">
  <a href="#main" class="skip-link">Ir para o formulário</a>
  <main class="admin-login-box" id="main">
    <header class="admin-login-header">
      <div class="admin-login-logo-wrap">
        <img src="../img/logo.jpg" alt="" class="admin-login-logo" width="80" height="80" decoding="async">
      </div>
      <p class="admin-login-eyebrow">Betim Cor Brazil</p>
      <h1 class="admin-login-title">Área administrativa</h1>
      <p class="admin-login-sub">Painel de conteúdo do site. Acesso restrito a pessoas autorizadas.</p>
    </header>

    <p id="admin-login-erro" class="login-erro admin-login-erro" role="alert" style="display: none;"></p>

    <form id="form-admin-login" class="admin-login-form" aria-label="Login administrativo">
      <div class="form-group">
        <label for="admin-usuario">Usuário</label>
        <input type="text" id="admin-usuario" name="usuario" autocomplete="username" required placeholder="Digite seu usuário">
      </div>
      <div class="form-group">
        <label for="admin-senha">Senha</label>
        <input type="password" id="admin-senha" name="senha" autocomplete="current-password" required placeholder="••••••••">
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary btn-block admin-login-submit">
          <span class="admin-login-submit-text">Entrar no painel</span>
        </button>
      </div>
    </form>

    <footer class="admin-login-footer">
      <div class="admin-login-footer-row">
        <a href="../index.html" class="admin-login-footer-link">← Voltar ao site</a>
        <span class="admin-login-footer-sep" aria-hidden="true">·</span>
        <a href="../contato.html" class="admin-login-footer-link">Recuperar acesso</a>
      </div>
      <p class="admin-login-footer-note">Esqueceu a senha? Entre em contato pela página de contato.</p>
    </footer>
  </main>
  <script src="../js/dados-site.js"></script>
  <script src="js/admin-auth.js"></script>
</body>
</html>
